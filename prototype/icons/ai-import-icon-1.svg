  </path>
  <!-- Medium 4-point sparkle (top-right) -->
  <path d="M370 140 C370 140 380 118 380 108 C380 118 390 140 390 140 C390 140 380 162 380 172 C380 162 370 140 370 140 Z" fill="white" opacity="0.8"/>
  <!-- Small 4-point sparkle (bottom-left) -->
  <path d="M130 350 C130 350 136 336 136 330 C136 336 142 350 142 350 C142 350 136 364 136 370 C136 364 130 350 130 350 Z" fill="white" opacity="0.6"/>
  <!-- Lightning bolt (AI symbol) -->
  <polygon points="256,120 220,268 262,268 232,400 310,238 268,238 298,120" fill="white" opacity="0.9"/>
