  # ---------------------------------------------------------------------------
  # E.9  Fixed-Length Rules (VR-FLT)
  # ---------------------------------------------------------------------------

  - ruleId: VR-FLT-001
    description: "All records must be the same fixed length"
    category: FLT
    appliesTo: [FLT]
    severity: ERROR
    autoFixable: false
    evaluator: fixed-length-consistency
    parameters: {}
    phase: FORMAT_SPECIFIC
    enabled: true
    version: 1

  - ruleId: VR-FLT-002
    description: "Amount field must be zero-padded integer (pence)"
    category: FLT
    appliesTo: [FLT]
    severity: ERROR
    autoFixable: true
    transformId: TF-PENCE-TO-POUNDS
    evaluator: pence-format
    parameters:
      fieldPosition: "29-39"
    phase: FORMAT_SPECIFIC
    enabled: true
    version: 1

  - ruleId: VR-FLT-003
    description: "Space-padded fields must be trimmed before content validation"
    category: FLT
    appliesTo: [FLT]
    severity: WARN
    autoFixable: true
    transformId: TF-TRIM
    evaluator: space-padding
    parameters: {}
    phase: FORMAT_SPECIFIC
    enabled: true
    version: 1

  - ruleId: VR-FLT-004
    description: "Date field (pos 71-78) must be valid YYYYMMDD"
    category: FLT
    appliesTo: [FLT]
    severity: ERROR
    autoFixable: false
    evaluator: date-format
    parameters:
      fieldPosition: "71-78"
      expectedFormat: "yyyyMMdd"
    phase: FORMAT_SPECIFIC
    enabled: true
    version: 1

  - ruleId: VR-FLT-005
    description: "Sort code fields (pos 1-6, 15-20) must be exactly 6 digits"
    category: FLT
    appliesTo: [FLT]
    severity: ERROR
    autoFixable: false
    evaluator: exact-length
    parameters:
      fieldPositions: ["1-6", "15-20"]
      exactLength: 6
      pattern: "^\\d{6}$"
    phase: FORMAT_SPECIFIC
    enabled: true
    version: 1

  - ruleId: VR-FLT-006
    description: "Account number fields (pos 7-14, 21-28) must be exactly 8 digits"
    category: FLT
    appliesTo: [FLT]
    severity: ERROR
    autoFixable: false
    evaluator: exact-length
    parameters:
      fieldPositions: ["7-14", "21-28"]
      exactLength: 8
      pattern: "^\\d{8}$"
    phase: FORMAT_SPECIFIC
    enabled: true
    version: 1

