      requiredTargetFields: ["amount", "beneficiaryAccountNumber", "beneficiarySortCode", "beneficiaryName"]
    phase: FORMAT_SPECIFIC
    enabled: true
    version: 1

  - ruleId: VR-ERP-003
    description: "All mandatory BACS target fields must be mappable or user-supplied"
    category: ERP
