    severity: ERROR
    autoFixable: prompt
    evaluator: field-coverage
    parameters:
      mandatoryFields: ["debitSortCode", "debitAccountNumber", "beneficiarySortCode", "beneficiaryAccountNumber", "beneficiaryName", "amount", "valueDate"]
    phase: FORMAT_SPECIFIC
    enabled: true
    version: 1

  - ruleId: VR-ERP-004
    description: "Date format must be recognized and converted to CBO target format"
