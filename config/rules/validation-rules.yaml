    evaluator: header-row-presence
    parameters: {}
    phase: FORMAT_SPECIFIC
    enabled: true
    version: 1

  - ruleId: VR-ERP-002
    description: "Non-payment columns must be identified and excluded"
    category: ERP
    appliesTo: [ERP]
    severity: WARN
    autoFixable: true
