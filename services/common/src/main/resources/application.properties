# ============================================================
# Common Quarkus Configuration — shared across all services
# ============================================================

# ----- Dev Profile (default for local development) -----
%dev.quarkus.datasource.db-kind=other
%dev.quarkus.datasource.jdbc.url=jdbc:sqlite:${user.dir}/data/import.db
%dev.quarkus.datasource.jdbc.driver=org.sqlite.JDBC
%dev.quarkus.datasource.jdbc.max-size=1

# LLM (Ollama)
%dev.llm.base-url=http://localhost:11434/v1
%dev.llm.model=mistral
%dev.llm.api-key=
%dev.llm.timeout-ms=15000
%dev.llm.confidence-threshold=0.6

# File storage
%dev.file-storage.type=local
%dev.file-storage.base-path=${user.dir}/data/storage

# Auth (mocked)
%dev.auth.type=mock
%dev.auth.default-tenant-id=local
%dev.auth.default-user=local-dev

# Logging
%dev.quarkus.log.level=DEBUG
%dev.quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n

# ----- Prod Profile -----
%prod.quarkus.log.level=INFO
